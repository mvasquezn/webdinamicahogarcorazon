services:
  drupal:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    volumes:
      - drupal_files:/var/www/html/web/sites/default/files
      # Mount setup scripts for live edits during development
      - ./setup:/var/www/html/setup
      # Mount custom theme for live edits (no image rebuild needed)
      - ./web/themes/custom:/var/www/html/web/themes/custom
      # Mount settings.php so it survives container recreates
      - ./web/sites/default/settings.php:/var/www/html/web/sites/default/settings.php:ro
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: drupal
      DB_USER: drupal
      DB_PASSWORD: drupal
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: drupal
      MYSQL_USER: drupal
      MYSQL_PASSWORD: drupal
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-udrupal", "-pdrupal"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  adminer:
    image: adminer:latest
    ports:
      - "8081:8080"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  drupal_files:
  db_data:
