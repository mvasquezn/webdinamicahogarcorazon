# ── Producción — El Hogar de Corazón ──────────────────────────────────────────
# Uso: docker compose -f docker-compose.prod.yml up -d --build
#
# Requiere un archivo .env.prod en el mismo directorio (ver .env.prod.example).
# El dominio se configura en la variable CADDY_DOMAIN de ese archivo.

services:

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    env_file: .env.prod
    depends_on:
      - drupal

  drupal:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - drupal_files:/var/www/html/web/sites/default/files
      - drupal_private:/var/drupal_private
      # settings.php se lee sólo; está en la imagen pero el volumen permite cambios sin rebuild
      - ./web/sites/default/settings.php:/var/www/html/web/sites/default/settings.php:ro
    env_file: .env.prod
    environment:
      APP_ENV: production
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.4
    restart: unless-stopped
    env_file: .env.prod
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u${DB_USER:-drupal}", "-p${DB_PASSWORD:-drupal}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  drupal_files:
  drupal_private:
  db_data:
  caddy_data:
  caddy_config:
